<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | EcoConnect</title>
    
    <!-- Enlazaremos los estilos y scripts en las siguientes tareas -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4">
    <main class="w-full max-w-[440px] flex flex-col items-center">
        <!-- Título de la Marca -->
        <div class="mb-stack-lg text-center">
            <h1 class="font-headline-md text-headline-md text-primary">EcoConnect</h1>
        </div>

        <!-- Tarjeta del Formulario de Login -->
        <div class="bg-surface-container-lowest w-full rounded-xl p-8 login-card-shadow border border-outline-variant/30">
            <h2 class="font-headline-sm text-headline-sm text-on-surface mb-stack-md text-center">Login</h2>
            
            <form id="login-form" class="space-y-stack-md">
                <!-- Campo Correo -->
                <div class="space-y-2">
                    <label class="font-label-md text-label-md text-on-surface-variant block ml-1" for="email">Email Address</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
                        <input class="w-full pl-12 pr-4 py-3 bg-background border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary-container/20 transition-all duration-200" id="email" name="email" placeholder="hello@example.com" required="" type="email"/>
                    </div>
                </div>

                <!-- Campo Contraseña -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
                        <a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot?</a>
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
                        <input class="w-full pl-12 pr-4 py-3 bg-background border border-outline-variant rounded-lg font-body-md text-body-md focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary-container/20 transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
                    </div>
                </div>

                <!-- Botón de Envío -->
                <button class="w-full py-4 bg-primary-container text-white font-label-md text-label-md rounded-full shadow-lg shadow-primary-container/20 hover:bg-primary transition-all duration-300 active:scale-95 mt-4" type="submit">
                    Login
                </button>
            </form>

            <div class="mt-stack-lg text-center border-t border-outline-variant/30 pt-stack-md">
                <p class="font-body-md text-body-md text-secondary">
                    Don't have an account? 
                    <a class="text-primary font-semibold hover:underline" href="register.html">Sign up</a>
                </p>
            </div>
        </div>

        <footer class="mt-8 text-center">
            <p class="font-label-sm text-label-sm text-outline">© 2026 EcoConnect. All rights reserved.</p>
        </footer>
    </main>

    <!-- Módulo de lógica que usaremos más adelante -->
    <script type="module" src="js/login.js"></script>
</body>
</html>
