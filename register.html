<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - EcoConnect</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <main class="container">
    <div class="card">
      
      <h2>Create Account</h2>
      <p class="subtitle">Join EcoConnect and start your journey.</p>

      <form id="registerForm">

        <div class="field">
          <label>Name</label>
          <input type="text" placeholder="John" required>
        </div>

        <div class="field">
          <label>Surname</label>
          <input type="text" placeholder="Doe" required>
        </div>

        <div class="field">
          <label>Phone</label>
          <input type="tel" placeholder="7XXXXXXX" pattern="7[0-9]{7}" required>
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" placeholder="email@example.com" required>
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" placeholder="••••••••" minlength="8" required>
        </div>

        <button type="submit">Create Account</button>

      </form>

      <p class="footer-text">
        Already have an account?
        <a href="index.html">Log in</a>
      </p>

    </div>
  </main>

  <script src="js/register.js"></script>
</body>
</html>
